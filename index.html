<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detective Academy Certificate Generator</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#12352b,#275243);
}

.container{
    max-width:1000px;
    margin:40px auto;
    background:#f8f5ea;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,.3);
}

h1{
    color:#12352b;
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.casefile{
    background:#ead9b5;
    border-left:8px solid darkred;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:20px;
    margin-bottom:8px;
    font-weight:bold;
    color:#12352b;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    border-radius:8px;
    border:2px solid #12352b;
}

button{
    margin-top:25px;
    padding:14px 25px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    background:#caa037;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#b88c25;
}

#printBtn{
    display:none;
    background:#12352b;
}

#error{
    display:none;
    color:red;
    font-weight:bold;
    margin-top:20px;
}

#certificate{
    display:none;
    position:relative;
    margin-top:30px;
}

#certificate img{
    width:100%;
}

#studentName{
    position:absolute;
    top:51%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    font-family:"Times New Roman", serif;
    font-style:italic;
    font-weight:bold;
    color:#163b2f;
    width:80%;
    text-align:center;
}

@media print{

body{
background:white;
}

.container>*:not(#certificate){
display:none;
}

#certificate{
display:block;
}

}
</style>

</head>

<body>

<div class="container">

<h1>🕵️ Detective Academy</h1>

<p class="subtitle">
Rookie Clearance Terminal
</p>

<div class="casefile">
Enter your detective name and the mission completion code you received after completing your training.
</div>

<label>Detective Name</label>

<input
id="name"
type="text"
placeholder="Enter your full name">

<label>Mission Completion Code</label>

<input
id="code"
type="password"
placeholder="Enter completion code">

<button onclick="verify()">
Verify Clearance
</button>

<button
id="printBtn"
onclick="window.print()">
Print Certificate
</button>

<div id="error">
Incorrect completion code.
</div>

<div id="certificate">

<img
src="certificate.png"
alt="Certificate">

<div id="studentName"></div>

</div>

</div>

<script>

const completionCode="ROOT2026";

function verify(){

const name=document.getElementById("name").value.trim();

const code=document.getElementById("code").value.trim();

if(name==""){

document.getElementById("error").innerHTML="Please enter your name.";

document.getElementById("error").style.display="block";

return;

}

if(code!==completionCode){

document.getElementById("error").innerHTML="Incorrect completion code.";

document.getElementById("error").style.display="block";

return;

}

document.getElementById("error").style.display="none";

document.getElementById("studentName").innerHTML=name;

document.getElementById("certificate").style.display="block";

document.getElementById("printBtn").style.display="inline-block";

document.getElementById("certificate").scrollIntoView({
behavior:"smooth"
});

}

</script>

</body>
</html>
